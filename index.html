<head>

<title>Sourdough Starter Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0F0E0C;overflow-x:hidden;font-family:system-ui,-apple-system,'Helvetica Neue',sans-serif;color:#F5F0E8}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* Tabs */
#tab-bar{display:flex;border-bottom:1px solid #3A3528;background:#1C1A16;position:sticky;top:0;z-index:100}
.tab-btn{flex:1;padding:10px 4px 9px;background:transparent;border:none;border-bottom:2px solid transparent;color:#6B6352;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-btn.active{color:#E8B84B;border-bottom:2px solid #E8B84B}
.tab-icon{font-size:18px}
.tab-label{font-size:10px;letter-spacing:.06em;font-weight:600;text-transform:uppercase}

/* Body */
#app-body{max-width:520px;margin:0 auto;padding:24px 16px 80px}

/* Header */
#header{padding:36px 20px 20px;text-align:center;border-bottom:1px solid #3A3528}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#A07E30;margin-bottom:8px;font-weight:700}
.title-row{display:flex;justify-content:center;gap:10px;align-items:baseline;margin-bottom:4px}
.title-plain{font-size:clamp(28px,8vw,42px);font-weight:300;color:#F5F0E8;letter-spacing:-.02em}
.title-gold{font-size:clamp(28px,8vw,42px);font-weight:700;color:#E8B84B;letter-spacing:-.02em}
.clock-row{margin-top:12px;display:flex;justify-content:center;gap:8px;align-items:center}
.clock-box{display:inline-flex;align-items:center;gap:10px;background:#1C1A16;border:1px solid #3A3528;border-radius:24px;padding:7px 14px}
.clock-time{font-size:17px;color:#F5F0E8;font-weight:600}
.tz-btn{background:transparent;border:1px solid #3A3528;border-radius:14px;padding:4px 10px;font-size:12px;color:#9B9180;white-space:nowrap}
.settings-btn{background:transparent;border:1px solid #3A3528;border-radius:20px;padding:7px 12px;font-size:18px;line-height:1}

/* Panels */
.panel{background:#1C1A16;border:1px solid #3A3528;border-radius:14px;padding:14px;margin-top:8px;display:none}
.panel.open{display:block}

/* Cards */
.card{background:#1C1A16;border:1px solid #3A3528;border-radius:14px;padding:16px 14px;margin-bottom:12px}
.card-head{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#9B9180;font-weight:700;margin-bottom:12px}

/* Section head */
.sec-head{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9B9180;font-weight:700;margin-bottom:12px;margin-top:4px}

/* Labels */
.lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#9B9180;font-weight:600;margin-bottom:8px}
.hint{font-size:13px;color:#6B6352;margin-top:7px;line-height:1.5}

/* Spacer */
.sp{height:20px}.sp-sm{height:8px}

/* Toggle */
.toggle{display:flex;background:#0F0E0C;border:1px solid #3A3528;border-radius:10px;padding:3px;margin-bottom:0}
.toggle button{flex:1;padding:11px 0;background:transparent;border:none;border-radius:8px;color:#6B6352;font-size:14px;font-weight:400;transition:all .15s}
.toggle button.active{background:#252218;color:#F5F0E8;font-weight:600}
.toggle.small button{padding:8px 0;font-size:13px}

/* Inputs */
.sel-input{width:100%;padding:12px 14px;background:#1C1A16;border:1.5px solid #3A3528;border-radius:10px;color:#F5F0E8;font-size:15px;outline:none;display:block;appearance:auto;-webkit-appearance:auto}
.text-input{width:100%;padding:12px 14px;background:#1C1A16;border:1.5px solid #3A3528;border-radius:10px;color:#F5F0E8;font-size:15px;outline:none;display:block;margin-top:8px}
.num-input{width:100%;padding:12px 14px;background:#1C1A16;border:1.5px solid #3A3528;border-radius:10px;color:#F5F0E8;font-size:15px;outline:none;display:block;margin-top:8px}
.time-input{width:100%;padding:12px 14px;background:#1C1A16;border:1.5px solid #3A3528;border-radius:10px;color:#F5F0E8;font-size:15px;font-weight:600;outline:none;display:block;color-scheme:dark}
textarea.text-input{resize:vertical;min-height:80px;line-height:1.5;margin-top:0}
select option{background:#1C1A16;color:#F5F0E8}

/* Range */
.rng{width:100%;height:5px;appearance:none;-webkit-appearance:none;background:#3A3528;border-radius:3px;outline:none;cursor:pointer;display:block;margin-bottom:2px}
.rng::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#E8B84B;cursor:pointer;border:3px solid #0F0E0C;box-shadow:0 0 0 2px #6B6040}
.rng::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#E8B84B;cursor:pointer;border:3px solid #0F0E0C}
.rng-cold{width:100%;height:5px;appearance:none;-webkit-appearance:none;background:#1E3A4A;border-radius:3px;outline:none;cursor:pointer;display:block;margin-bottom:2px}
.rng-cold::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#7AB8D4;cursor:pointer;border:3px solid #0A0E14;box-shadow:0 0 0 2px #1E3A4A}
.rng-ends{display:flex;justify-content:space-between;font-size:11px;color:#6B6352;margin-top:4px}

/* Buttons */
.go-btn{width:100%;padding:16px 0;background:#E8B84B;border:none;border-radius:12px;color:#0F0E0C;font-size:16px;font-weight:700;letter-spacing:.03em;margin:4px 0;transition:opacity .15s}
.go-btn:active{opacity:.88}
.ghost-btn{background:transparent;border:1px solid #3A3528;border-radius:8px;padding:6px 14px;font-size:12px;color:#6B6352}
.step-btn{width:40px;height:40px;background:#252218;border:1px solid #3A3528;color:#F5F0E8;font-size:20px;border-radius:8px;font-weight:600}
.timer-btn{padding:11px 24px;background:#E8B84B;border:none;border-radius:10px;color:#0F0E0C;font-size:14px;font-weight:700}

/* Chips */
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.chip{padding:8px 14px;background:#0F0E0C;border:1px solid #3A3528;border-radius:20px;color:#9B9180;font-size:13px;font-weight:400}
.chip.active{background:#252218;border-color:#E8B84B66;color:#E8B84B;font-weight:600}

/* Tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.tile{background:#252218;border:1px solid #3A3528;border-radius:12px;padding:14px 12px}
.tile.hi{border-color:#6B6040}
.tile-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#6B6352;margin-bottom:6px;font-weight:600}
.tile-big{font-size:24px;color:#F5F0E8;font-weight:700;margin-bottom:4px;line-height:1}
.tile.hi .tile-big{color:#E8B84B}
.tile-sub{font-size:11px;color:#6B6352}

/* Pills */
.pill-row{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.big-pill{flex:1;border-radius:10px;padding:10px 6px;text-align:center;min-width:64px}
.big-pill-dot{width:6px;height:6px;border-radius:50%;margin:0 auto 6px}
.big-pill-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#9B9180;margin-bottom:3px}
.big-pill-val{font-size:20px;color:#F5F0E8;font-weight:700}
.plus-sign{color:#3A3528;font-size:16px;align-self:center}

/* Timeline */
.timeline{display:flex;align-items:center;margin-bottom:14px}
.t-bar{flex:1;height:2px;background:#3A3528}
.t-block{background:#252218;border:1px solid #3A3528;border-radius:10px;padding:10px 8px;text-align:center;min-width:88px;flex:1}
.t-block.gold{border-color:#E8B84B44}
.t-block.warn{border-color:#8A4020}
.t-icon{font-size:18px;margin-bottom:3px}
.t-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#6B6352;margin-bottom:3px;font-weight:600}
.t-time{font-size:16px;color:#F5F0E8;font-weight:700;margin-bottom:2px}
.t-block.gold .t-time{color:#E8B84B}
.t-sub{font-size:10px;color:#6B6352}

/* Time box */
.time-box{margin-top:10px;background:#252218;border-radius:8px;padding:8px 12px}
.time-box-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.time-box-now{font-size:12px;color:#9B9180}
.time-box-arrow{font-size:12px;color:#3A3528}
.time-box-mix{font-size:12px;color:#E8B84B;font-weight:600}
.time-box-window{text-align:center;font-size:12px;font-weight:600;border-top:1px solid #3A3528;padding-top:6px}
.time-box-window.ok{color:#6FCF8A}
.time-box-window.warn{color:#E07060}

/* Status boxes */
.box-red{background:#2E0E0A;border:1px solid #E0706066;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.box-gold{background:#2A2308;border:1px solid #E8B84B88;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.box-green{background:#0A2A14;border:1px solid #6FCF8A88;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.box-head-red{color:#E07060;font-weight:700;font-size:14px;margin-bottom:4px}
.box-head-gold{color:#E8B84B;font-weight:700;font-size:14px;margin-bottom:4px}
.box-text{font-size:13px;color:#9B9180;line-height:1.6}

/* Info box */
.info-box{background:#252218;border:1px solid #3A3528;border-radius:10px;padding:12px 14px;font-size:13px;color:#9B9180;line-height:1.6;margin-bottom:16px}

/* Feedback buttons */
.fb-row{display:flex;gap:8px}
.fb-btn{flex:1;padding:12px 4px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;border-width:1.5px;border-style:solid}
.fb-btn-icon{font-size:20px;margin-bottom:4px}
.fb-green{color:#6FCF8A;background:#6FCF8A18;border-color:#6FCF8A55}
.fb-gold{color:#E8B84B;background:#E8B84B18;border-color:#E8B84B55}
.fb-red{color:#E07060;background:#E0706018;border-color:#E0706055}

/* Flour tag */
.flour-tag{display:flex;align-items:center;gap:8px;background:#252218;border:1px solid #3A3528;border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:13px}

/* Badge */
.bdg{background:#252218;border-radius:20px;padding:2px 10px;font-size:11px;color:#E8B84B;letter-spacing:.06em;margin-left:8px}

/* Err */
.err-box{background:#2A0E0A;border:1px solid #E0706055;border-radius:8px;padding:10px 14px;font-size:13px;color:#E07060;margin-bottom:16px}

/* Out row */
.out-row{display:flex;align-items:center}
.out-block{flex:1;text-align:center}
.out-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6B6352;margin-bottom:5px;font-weight:600}
.out-val{font-size:28px;color:#F5F0E8;font-weight:700;margin-bottom:2px}
.out-sub{font-size:11px;color:#6B6352}
.out-arrow{color:#3A3528;font-size:20px;padding:0 6px}

/* Hist pill */
.hist-pill{background:#252218;border-radius:6px;padding:3px 8px;display:inline-flex;gap:5px;align-items:center}
.hist-pill-label{font-size:10px;color:#6B6352;text-transform:uppercase;letter-spacing:.06em}
.hist-pill-val{font-size:12px;color:#F5F0E8;font-weight:600}

/* Day buttons */
.day-btn{flex:1;padding:14px 10px;text-align:center;background:#0F0E0C;border:1.5px solid #3A3528;border-radius:12px;color:#9B9180}
.day-btn.active{background:#252218;border-color:#E8B84B88;color:#F5F0E8}
.day-icon{font-size:26px;margin-bottom:6px}
.day-title{font-size:14px;font-weight:400;margin-bottom:3px}
.day-btn.active .day-title{font-weight:700}
.day-sub{font-size:11px;color:#6B6352;line-height:1.4}
.day-btn.active .day-sub{color:#9B9180}

/* Vessel buttons */
.vessel-grid{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.vessel-btn{flex:1;min-width:80px;padding:12px 8px;background:#0F0E0C;border:1.5px solid #3A3528;border-radius:10px;color:#9B9180;text-align:center}
.vessel-btn.active{background:#252218;border-color:#E8B84B66;color:#F5F0E8}
.vessel-icon{font-size:22px;margin-bottom:4px}
.vessel-label{font-size:12px;line-height:1.3}
.vessel-btn.active .vessel-label{font-weight:600}

/* Inclusion */
.inc-btn{width:100%;padding:11px 14px;text-align:left;background:#0F0E0C;border:1.5px solid #3A3528;border-radius:10px;color:#9B9180;font-size:14px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.inc-btn.active{background:#252218;border-color:#E8B84B66;color:#F5F0E8}
.inc-check{width:18px;height:18px;border-radius:4px;background:transparent;border:2px solid #3A3528;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#0F0E0C;font-weight:700}
.inc-btn.active .inc-check{background:#E8B84B;border-color:#E8B84B}
.inc-group-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#6B6352;font-weight:700;margin-bottom:8px;padding-left:2px;margin-top:4px}

/* Size btns */
.size-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.size-btn{flex:1;padding:10px 6px;text-align:center;background:#0F0E0C;border:1.5px solid #3A3528;border-radius:10px;color:#9B9180}
.size-btn.active{background:#252218;border-color:#E8B84B66;color:#F5F0E8}
.size-btn-label{font-size:13px;font-weight:400}
.size-btn.active .size-btn-label{font-weight:700}
.size-btn-sub{font-size:11px;color:#6B6352;margin-top:2px}

/* Timer */
.timer-circle{position:relative;width:152px;height:152px;margin:0 auto 16px}
.timer-btns{display:flex;gap:10px;justify-content:center}

/* Stepper */
.stepper{display:flex;align-items:center}
.stepper-val{width:44px;text-align:center;font-size:22px;color:#F5F0E8;font-weight:600}

/* Row */
.field-row{display:flex;gap:14px;margin-bottom:20px;align-items:flex-start}

/* Log bake btn */
.log-btn{width:100%;padding:16px 0;background:#252218;border:1.5px solid #6B6040;border-radius:12px;color:#E8B84B;font-size:15px;font-weight:700;letter-spacing:.03em;margin:4px 0}

/* Proofer box */
.proofer-box{background:#252218;border:1px solid #6B6040;border-radius:12px;padding:14px;margin-top:14px;margin-bottom:20px}

/* Advanced toggle */
.adv-toggle-btn{width:100%;background:transparent;border:1px solid #3A3528;border-radius:10px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;color:#9B9180;font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.adv-content{margin-top:12px}

/* Fade in */
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fi .25s ease}

/* Hyd */
.hyd-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hyd-label{font-size:13px;color:#9B9180}
.hyd-val{font-size:15px;color:#F5F0E8}
.hyd-row.big .hyd-label{font-size:14px;color:#F5F0E8;font-weight:600}
.hyd-row.big .hyd-val{font-size:28px;color:#E8B84B;font-weight:700}
.divider{border-top:1px solid #3A3528;margin:12px 0}

/* Bake plan step */
.bake-step{background:#1C1A16;border:1px solid #3A3528;border-radius:14px;padding:16px 14px;margin-bottom:10px}
.bake-step.main-step{border-color:#E8B84B44}
.bake-step-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.bake-step-label{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#9B9180;font-weight:700}
.bake-step.main-step .bake-step-label{color:#E8B84B}
.bake-step-mins{font-size:22px;color:#F5F0E8;font-weight:700}
.bake-step-temp{font-size:22px;color:#E8B84B;font-weight:700;margin-bottom:6px}
.bake-step-detail{font-size:13px;color:#9B9180;line-height:1.6}

/* Obs */
.obs-box{background:#2A2308;border:1px solid #E8B84B88;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.obs-text{font-size:13px;color:#F5F0E8;line-height:1.6}

/* Bake log card pills */
.rating-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
.rating-pill{background:#252218;border:1px solid #3A3528;border-radius:20px;padding:4px 10px;font-size:12px;color:#F5F0E8}

/* Empty state */
.empty-state{text-align:center;padding:32px 20px;color:#6B6352;font-size:14px;line-height:1.6}
.empty-icon{font-size:32px;margin-bottom:12px}
</style>
</head>
<body>

<div id="header">
  <div class="eyebrow">Sourdough</div>
  <div class="title-row">
    <span class="title-plain">Starter</span>
    <span class="title-gold">Calculator</span>
  </div>
  <div class="clock-row">
    <div class="clock-box">
      <span class="clock-time" id="clock-display">--:-- am</span>
      <button class="tz-btn" id="tz-btn">🌏 <span id="tz-short">Sydney</span> ▼</button>
    </div>
    <button class="settings-btn" id="settings-btn">⚙️</button>
  </div>
  <div class="panel" id="tz-panel">
    <div id="tz-list"></div>
  </div>
  <div class="panel" id="settings-panel">
    <div class="sec-head">Settings</div>
    <div style="margin-bottom:16px">
      <div class="lbl">Starter name</div>
      <input type="text" class="text-input" id="starter-name-input" placeholder="e.g. Levvie, Frank…" maxlength="30" style="margin-top:0">
      <div class="hint">Personalises the app and appears in notifications</div>
    </div>
    <div>
      <div class="lbl">Peak notifications</div>
      <div id="notif-section"></div>
    </div>
    <div id="bias-badge-wrap"></div>
  </div>
</div>

<div id="tab-bar"></div>
<div id="app-body"></div>

<script>
(function(){
window.onerror=function(msg,src,line,col,err){document.getElementById('app-body').innerHTML='<div style="color:#E07060;padding:20px;font-family:sans-serif;font-size:13px;line-height:1.6"><strong>Error:</strong> '+msg+'<br>Line: '+line+'<br>'+(err?err.stack||'':'')+'</div>';return false;};

// ---- State ----
var LS_KEY='sourdough_starter';
var OLD_KEYS=['sourdough_calc_v1','sourdough_calc_v2','sourdough_calc_v3','sourdough_calc_v4'];

function loadStorage(){
  try{
    var r=localStorage.getItem(LS_KEY);
    if(r)return JSON.parse(r);
    for(var i=0;i<OLD_KEYS.length;i++){var o=localStorage.getItem(OLD_KEYS[i]);if(o){var d=JSON.parse(o);saveStorage(d);return d;}}
    return null;
  }catch(e){return null;}
}
function saveStorage(d){try{localStorage.setItem(LS_KEY,JSON.stringify(d));}catch(e){}}

var stored=loadStorage()||{};
var STATE={
  tab:0,
  bias:stored.bias!=null?stored.bias:1.35,
  history:stored.history||[],
  bakeLog:stored.bakeLog||[],
  tz:stored.tz||detectTimezone(),
  starterName:stored.starterName||''
};

function save(){saveStorage({bias:STATE.bias,history:STATE.history,bakeLog:STATE.bakeLog,tz:STATE.tz,starterName:STATE.starterName});}

// ---- Utils ----
function pad2(n){return n<10?'0'+n:''+n;}
function detectTimezone(){try{return Intl.DateTimeFormat().resolvedOptions().timeZone;}catch(e){return 'Australia/Sydney';}}

function nowInTz(tz){
  var s=new Intl.DateTimeFormat('en-AU',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date());
  return s.replace(/^24:/,'00:');

var BASE_PEAKS={'1':4,'1.5':4.5,'2':5,'3':6,'4':7,'5':8,'6':9,'8':11,'10':14};
var BKEYS=Object.keys(BASE_PEAKS).map(Number).sort(function(a,b){return a-b;});
function baseHours(ratio){
  if(ratio<=BKEYS[0])return BASE_PEAKS[BKEYS[0]];
  if(ratio>=BKEYS[BKEYS.length-1])return BASE_PEAKS[BKEYS[BKEYS.length-1]];
  for(var i=0;i<BKEYS.length-1;i++){
    var lo=BKEYS[i],hi=BKEYS[i+1];

  }
  return 8;
}

}

// ---- Observations ----
function generateObservations(bakeLog){
  if(bakeLog.length<3)return [];

  var ferments=recent.filter(function(b){return b.ratings&&b.ratings.ferment;}).map(function(b){return b.ratings.ferment;});
  if(ferments.length>=3){var under=ferments.filter(function(f){return f==='Underproofed';}).length,over=ferments.filter(function(f){return f==='Overproofed';}).length;if(under>=Math.ceil(ferments.length*0.6))obs.push("You're consistently underproofing \u2014 try extending bulk fermentation by 30\u201360 minutes.");else if(over>=Math.ceil(ferments.length*0.6))obs.push("You're consistently overproofing \u2014 pull the dough earlier or reduce bulk time.");}
  var springs=recent.filter(function(b){return b.ratings&&b.ratings.spring;}).map(function(b){return b.ratings.spring;});
  if(springs.length>=3){var flat=springs.filter(function(s){return s==='Flat';}).length;if(flat>=Math.ceil(springs.length*0.6))obs.push('Flat oven spring is recurring \u2014 check shaping tension and scoring depth.');}
  var crumbs=recent.filter(function(b){return b.ratings&&b.ratings.crumb;}).map(function(b){return b.ratings.crumb;});
  if(crumbs.length>=3){var dense=crumbs.filter(function(c){return c==='Dense'||c==='Gummy';}).length;if(dense>=Math.ceil(crumbs.length*0.6))obs.push('Dense or gummy crumb showing up repeatedly \u2014 likely underproofing or pulling too early.');}
  var overalls=recent.filter(function(b){return b.ratings&&b.ratings.overall;}).map(function(b){return b.ratings.overall;});
  if(overalls.length>=3){var good=overalls.filter(function(o){return o.indexOf('Best')>-1||o.indexOf('Happy')>-1;}).length,bad=overalls.filter(function(o){return o==='Meh'||o.indexOf('Bin')>-1;}).length;if(good>=Math.ceil(overalls.length*0.7))obs.push("Your recent bakes are consistently strong \u2014 whatever you're doing, keep doing it.");else if(bad>=Math.ceil(overalls.length*0.6))obs.push('A run of disappointing bakes \u2014 worth going back to basics and checking starter activity.');}
  var temps=recent.filter(function(b){return b.internalTemp&&b.internalTemp>0;}).map(function(b){return b.internalTemp;});
  if(temps.length>=3){var low=temps.filter(function(t){return t<96;}).length;if(low>=Math.ceil(temps.length*0.6))obs.push("You're pulling loaves early \u2014 internal temp often below 96\u00B0C. Target 98\u00B0C minimum.");}
  return obs;
}

// ---- Timer component ----
var timerInterval=null;
var timerNotifRef=null;
function makeTimer(peakHrs,starterName){
  var total=Math.max(Math.round((peakHrs-0.4)*3600),60);
  var secs=total,running=false,started=false,done=false;
  var card=makeCard([makeCardHead('\u23F1 Starter timer')]);

  var svgNS='http://www.w3.org/2000/svg';
  var svgEl=document.createElementNS(svgNS,'svg');svgEl.setAttribute('width','152');svgEl.setAttribute('height','152');svgEl.style.cssText='position:absolute;top:0;left:0';
  var bg=document.createElementNS(svgNS,'circle');bg.setAttribute('cx','76');bg.setAttribute('cy','76');bg.setAttribute('r','54');bg.setAttribute('fill','none');bg.setAttribute('stroke','#252218');bg.setAttribute('stroke-width','6');
  var arc=document.createElementNS(svgNS,'circle');arc.setAttribute('cx','76');arc.setAttribute('cy','76');arc.setAttribute('r','54');arc.setAttribute('fill','none');arc.setAttribute('stroke','#E8B84B');arc.setAttribute('stroke-width','6');arc.setAttribute('stroke-linecap','round');arc.style.cssText='transform:rotate(-90deg);transform-origin:76px 76px;transition:stroke-dasharray 0.8s linear';
  svgEl.appendChild(bg);svgEl.appendChild(arc);

  var circ=2*Math.PI*54;
  arc.setAttribute('stroke-dasharray','0 '+circ);

  var timeDisp=div('');timeDisp.style.cssText='font-size:26px;color:#F5F0E8;text-align:center';

  var circWrap=div('timer-circle');circWrap.style.position='relative';
  append(circWrap,svgEl);
  var inner=div('');inner.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center';
  inner.appendChild(timeDisp);circWrap.appendChild(inner);

  var btnRow=div('timer-btns');
  var startBtn=el('button',{'class':'timer-btn go-btn'},'Start timer');
  var pauseBtn=el('button',{'class':'timer-btn'},'Pause');
  var resetBtn=el('button',{'class':'timer-btn'},'Reset');
  pauseBtn.style.display='none';resetBtn.style.display='none';
  resetBtn.style.cssText='background:transparent;color:#9B9180;border:1px solid #3A3528;border-radius:10px;padding:11px 24px;font-size:14px;font-weight:700;display:none';

  var statusDiv=div('hint');statusDiv.style.cssText='text-align:center;margin-top:10px';

  append(btnRow,startBtn,pauseBtn,resetBtn);
  append(card,circWrap,btnRow,statusDiv);

  function updateDisplay(){
    var h=Math.floor(secs/3600),m=Math.floor(secs%3600/60),s=secs%60;
    if(done){timeDisp.style.color='#6FCF8A';timeDisp.innerHTML='Peak!<br>Mix now';}
    else{timeDisp.style.color='#F5F0E8';timeDisp.textContent=h>0?h+':'+pad2(m)+':'+pad2(s):pad2(m)+':'+pad2(s);}
    var prog=1-secs/total;var dash=circ*prog;
    arc.setAttribute('stroke-dasharray',dash+' '+circ);
    arc.setAttribute('stroke',done?'#6FCF8A':'#E8B84B');
  }

  function tick(){
    if(secs<=1){clearInterval(timerInterval);timerInterval=null;secs=0;running=false;done=true;updateDisplay();startBtn.textContent='Start again';startBtn.style.display='';pauseBtn.style.display='none';resetBtn.style.display='none';statusDiv.textContent='Earliest peak reached \u2014 use it now if it\'s domed and bubbly';statusDiv.style.color='#6FCF8A';return;}
    secs--;updateDisplay();
  }

  startBtn.addEventListener('click',function(){
    if(done){secs=total;done=false;started=false;updateDisplay();}
    running=true;started=true;done=false;
    if(timerInterval)clearInterval(timerInterval);
    timerInterval=setInterval(tick,1000);
    startBtn.style.display='none';
    pauseBtn.style.display='';resetBtn.style.display='';
    statusDiv.style.color='#6B6352';statusDiv.textContent='Watch for the dome \u2014 not just the clock';
    if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
      if(timerNotifRef)clearTimeout(timerNotifRef);
      timerNotifRef=setTimeout(function(){try{new Notification('Time to check '+(starterName||'your starter')+'! 🍞',{body:'Earliest peak reached \u2014 look for the dome and bubbles.',tag:'starter-peak',renotify:true});}catch(e){}},total*1000);
      statusDiv.textContent='🔔 Notification set \u2014 you\'ll be alerted at peak';
    }
    updateDisplay();
  });

  pauseBtn.addEventListener('click',function(){
    if(running){clearInterval(timerInterval);timerInterval=null;running=false;pauseBtn.textContent='Resume';pauseBtn.style.background='#c8a060';pauseBtn.style.color='#0F0E0C';}
    else{if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(tick,1000);running=true;pauseBtn.textContent='Pause';pauseBtn.style.background='#252218';pauseBtn.style.color='#F5F0E8';}
  });

  resetBtn.addEventListener('click',function(){
    clearInterval(timerInterval);timerInterval=null;if(timerNotifRef)clearTimeout(timerNotifRef);
    secs=total;running=false;started=false;done=false;
    startBtn.style.display='';pauseBtn.style.display='none';resetBtn.style.display='none';
    statusDiv.textContent='';updateDisplay();
  });

  pauseBtn.style.cssText='padding:11px 24px;background:#252218;border:none;border-radius:10px;color:#F5F0E8;font-size:14px;font-weight:700;display:none';

  updateDisplay();
  return card;
}

      var boostSliderWrap=div('');boostSliderWrap.style.display=boostF!=='none'?'':'none';
      boostSliderWrap.appendChild(makeSlider({label:'Amount',display:boostP+'%',displayFn:function(v){return v+'%';},min:5,max:50,step:5,value:boostP,hint:boostHint(boostP),hintFn:boostHint,lo:'5%',hi:'50%',onChange:function(v){boostP=v;}}));

      PJARS.forEach(function(g){var chip=makeChip(g+'g',jarMode==='known'&&jarG===g,function(){jarMode='known';jarG=g;updateJarChips();jarCustomWrap.style.display='none';jarHint.textContent=g+'g in jar \u2014 feed amounts will be based on this';});chip.dataset.val=g;jarChips.appendChild(chip);});

      function updateJarChips(){
        var allChips=jarChips.querySelectorAll('.chip');

      var resCustomChip=makeChip('Custom',resMode==='custom',function(){resMode='custom';updateResChips();resCustomWrap.style.display='';});
      resChips.appendChild(resCustomChip);

      var resCustomInp=el('input',{type:'number',class:'num-input',value:resCustom,min:5,max:500,placeholder:'Reserve (g)'});

      function updateResChips(){

    function calculate(errBox,resultArea,feedAtOverride){
      errBox.innerHTML='';resultArea.innerHTML='';
      var splG=splMode==='preset'?spl:splCustom;
      var reserveG=resMode==='preset'?res:resCustom;
      var levain=splG*loaves,totalNeeded=levain+reserveG;
      var fm=flourMult(baseF,boostF,boostF==='none'?0:boostP);
      var ratio,feedStr,peakStr,peak;
      var nowStr=nowInTz(STATE.tz);
      var effectiveTemp=getEffectiveTemp();

      if(mode==='suggest'){
        feedStr=nowStr;
        var mixByInp=modeContent.querySelector('input[type=time]');
        var mixBy=mixByInp?mixByInp.value:addHoursToStr(nowStr,8);
        var ha=hoursBetween(nowStr,mixBy);
        if(ha<0.5){errBox.appendChild(makeErrBox('Mix time needs to be at least 30 minutes from now'));return;}
        ratio=suggestRatio(ha,effectiveTemp,fm,STATE.bias);
        peak=peakHours(ratio,effectiveTemp,fm,STATE.bias);
        peakStr=addHoursToStr(nowStr,peak);
      }else{
        ratio=ratioP==='custom'?parseRatioStr(ratioCustom):ratioP;
        if(!ratio){errBox.appendChild(makeErrBox('Can\'t parse that ratio \u2014 try 1:2:2 or 1:5:5'));return;}
        var feedAtInp=modeContent.querySelector('input[type=time]');
        feedStr=feedAtInp?feedAtInp.value:nowStr;
        peak=peakHours(ratio,effectiveTemp,fm,STATE.bias);
        peakStr=addHoursToStr(feedStr,peak);
      }

      var feedCalc,jarNote=null;
      var actualJarG=jarMode==='unknown'?null:jarG;
      if(actualJarG!==null){
        var idealFeed=calcFeedForTarget(totalNeeded,ratio,hyd);
        var idealSeed=idealFeed.seed;
        if(actualJarG>idealSeed){
          var discard=actualJarG-idealSeed;
          feedCalc=calcFeedFromSeed(idealSeed,ratio,hyd);
          jarNote={type:'discard',discard:discard,idealSeed:idealSeed,levainOut:levain,reserveOut:reserveG};
        }else if(actualJarG<idealSeed){
          feedCalc=calcFeedFromSeed(actualJarG,ratio,hyd);
          var produced=feedCalc.total,aLevain=Math.max(produced-reserveG,0),aRes=Math.min(reserveG,produced);
          jarNote={type:'low',produced:produced,levainOut:aLevain,reserveOut:aRes,shortfall:idealSeed-actualJarG};
        }else{feedCalc=calcFeedFromSeed(actualJarG,ratio,hyd);jarNote={type:'ok',levainOut:levain,reserveOut:reserveG};}
        feedCalc._levain=jarNote.levainOut;feedCalc._reserve=jarNote.reserveOut;
      }else{feedCalc=calcFeedForTarget(totalNeeded,ratio,hyd);feedCalc._levain=levain;feedCalc._reserve=reserveG;}

      var finalBoostPct=boostF==='none'?0:boostP;
      var flourLabel=flourDesc(baseF,boostF,finalBoostPct);
      var fasterPct=fm<0.95?Math.round((1-fm)*100):0;

      resultArea.className='fade-in';

      // Results
      resultArea.appendChild(makeSectionHead('Your feed plan'));
      if(flourLabel)resultArea.appendChild(makeFlourTag(flourLabel,fasterPct));

      // Timeline card
      var tlCard=makeCard([makeCardHead('Timeline'),makeTimeline(feedStr,peakStr,STATE.tz)]);
      var tlNote=div('');tlNote.style.cssText='font-size:13px;color:#9B9180;line-height:1.6;margin-top:12px;padding-top:10px;border-top:1px solid #3A3528';
      tlNote.innerHTML='Mix your dough <strong style="color:#F5F0E8">at peak</strong> \u2014 domed top, full of bubbles, jiggles when shaken.';
      tlCard.appendChild(tlNote);resultArea.appendChild(tlCard);

      var tiles=div('tiles');append(tiles,makeTile('Feeding ratio',fmtRatio(ratio),'starter : flour : water',false),makeTile('Est. peak',fmtH(peak),'at '+effectiveTemp+'\u00B0C',true));
      resultArea.appendChild(tiles);

      // Jar notes
      if(jarNote&&jarNote.type==='discard'){var d=div('box-red');append(d,div('box-head-red','\u2193 Discard first'),div('box-text','You have '+actualJarG+'g but only need '+jarNote.idealSeed+'g as starter. '));var strong=el('strong',{style:'color:#F5F0E8'},'Discard '+jarNote.discard+'g');d.querySelector('.box-text').appendChild(strong);d.querySelector('.box-text').appendChild(txt(' before feeding \u2014 then add the flour and water below.'));resultArea.appendChild(d);}
      if(jarNote&&jarNote.type==='low'){var d2=div('box-gold');append(d2,div('box-head-gold','\u2193 Adjusted for your jar'),div('box-text','You have '+actualJarG+'g but ideally need '+(actualJarG+jarNote.shortfall)+'g as starter. Feed amounts scaled to what you have \u2014 levain output will be slightly less than ideal.'));resultArea.appendChild(d2);}
      if(jarNote&&jarNote.type==='ok'){var d3=div('box-green');append(d3,el('span',{},'✓'),div('','\u2713 You have exactly what\'s needed \u2014 no discard required'));d3.style.color='#6FCF8A';d3.style.fontSize='13px';d3.style.fontWeight='600';resultArea.appendChild(d3);}

      // What goes in jar
      var baseLbl=(BASE_FLOUR[baseF]||{label:''}).label.split('/')[0].trim();
      var boostLbl='';var bfObj=BOOST_FLOURS.filter(function(f){return f.id===boostF;})[0];if(bfObj)boostLbl=bfObj.label.split(' ')[0];
      var jarCard=makeCard([makeCardHead(append(document.createElement('span'),'What goes in the jar ',makeBdg(feedCalc.total+'g total')))]);
      var pillRow=div('pill-row');
      append(pillRow,makeBigPill('Starter',feedCalc.seed,'#E8B84B'),div('plus-sign','+'));
      if(boostF!=='none'){append(pillRow,makeBigPill(baseLbl,Math.round(feedCalc.flour*(1-finalBoostPct/100)),'#C8B878'),div('plus-sign','+'),makeBigPill(boostLbl,Math.round(feedCalc.flour*finalBoostPct/100),'#B8956A'));}else{pillRow.appendChild(makeBigPill('Flour',feedCalc.flour,'#C8B878'));}
      append(pillRow,div('plus-sign','+'),makeBigPill('Water',feedCalc.water,'#7AB8D4'));
      jarCard.appendChild(pillRow);
      var divEl=div('divider');jarCard.appendChild(divEl);
      var outRow=div('out-row');
      var intoBlock=div('out-block');append(intoBlock,div('out-label','Into dough'),div('out-val',feedCalc._levain+'g'),div('out-sub',loaves+' \u00D7 '+splG+'g'));
      var backBlock=div('out-block');append(backBlock,div('out-label','Back in jar'),div('out-val',feedCalc._reserve+'g'),div('out-sub','your next starter'));
      append(outRow,intoBlock,div('out-arrow','\u2192'),backBlock);
      jarCard.appendChild(outRow);resultArea.appendChild(jarCard);

      // Timer
      resultArea.appendChild(makeTimer(peak,STATE.starterName||'your starter'));

      // Feedback
      var fbDone=false;
      var fbCard=makeCard([makeCardHead('Was this accurate?'),div('hint','After your starter peaks, tap below to help calibrate future estimates.')]);
      var fbRow=div('fb-row');
      var earlyBtn=makeFbBtn('\u26A1','Peaked early','fb-btn fb-green',function(){if(!fbDone){fbDone=true;STATE.bias=applyFeedback(STATE.bias,'early');save();fbCard.innerHTML='';append(fbCard,div('box-green','\u2713 Feedback saved \u2014 model updated'));}});
      var spotBtn=makeFbBtn('\u2713','Spot on','fb-btn fb-gold',function(){if(!fbDone){fbDone=true;STATE.bias=applyFeedback(STATE.bias,'spot-on');save();fbCard.innerHTML='';append(fbCard,div('box-green','\u2713 Feedback saved \u2014 model updated'));}});
      var lateBtn=makeFbBtn('🐢','Peaked late','fb-btn fb-red',function(){if(!fbDone){fbDone=true;STATE.bias=applyFeedback(STATE.bias,'late');save();fbCard.innerHTML='';append(fbCard,div('box-green','\u2713 Feedback saved \u2014 model updated'));}});
      append(fbRow,earlyBtn,spotBtn,lateBtn);fbCard.appendChild(fbRow);resultArea.appendChild(fbCard);

      // Log bake
      var logBtn=el('button',{'class':'log-btn'},'📓 Log this bake');
      var logArea=div('');
      logBtn.addEventListener('click',function(){logBtn.style.display='none';logArea.appendChild(makeBakeLogForm({ratio:ratio,flourLabel:flourLabel,tempC:effectiveTemp,peak:peak},function(entry){STATE.bakeLog.unshift(entry);if(STATE.bakeLog.length>100)STATE.bakeLog.pop();save();logArea.innerHTML='';var conf=div('box-green');append(conf,txt('📓 Bake logged \u2014 find it in Bake Log'));conf.style.color='#6FCF8A';logArea.appendChild(conf);},function(){logBtn.style.display='';logArea.innerHTML='';}));});
      append(resultArea,logBtn,logArea);
    }

    updateModeContent();
    return doughWrap;
  }

  wrap.appendChild(buildPlanner());
  return wrap;
}

  BOOST_FLOURS.forEach(function(f){var o=el('option',{value:f.id},f.label);boostSel.appendChild(o);});
  var boostSlWrap=div('');boostSlWrap.style.display='none';
  boostSlWrap.appendChild(makeSlider({label:'Amount',display:boostP+'%',displayFn:function(v){return v+'%';},min:5,max:50,step:5,value:boostP,hint:boostHint(boostP),hintFn:boostHint,lo:'5%',hi:'50%',onChange:function(v){boostP=v;}}));
  boostSel.addEventListener('change',function(){boostF=boostSel.value;boostSlWrap.style.display=boostF!=='none'?'':'none';});
  boostWrap.appendChild(boostSel);boostWrap.appendChild(boostSlWrap);wrap.appendChild(boostWrap);

  var goBtn=el('button',{'class':'go-btn'},'Show my window');
  var resultArea=div('');
  goBtn.addEventListener('click',function(){
    resultArea.innerHTML='';
    var ratio=ratioP==='custom'?parseRatioStr(customInp.value):ratioP;
    if(!ratio)return;
    var fm=flourMult(baseF,boostF,boostF==='none'?0:boostP);
    var peak=peakHours(ratio,tempC,fm,STATE.bias);
    var feedStr=timeInp.value;
    var peakStr=addHoursToStr(feedStr,peak);
    var useByStr=addHoursToStr(feedStr,peak+1);
    var fl=flourDesc(baseF,boostF,boostF==='none'?0:boostP);
    resultArea.className='fade-in';
    resultArea.appendChild(makeSectionHead('Feed timeline'));
    if(fl)resultArea.appendChild(makeFlourTag(fl,0));
    resultArea.appendChild(makeTimeline(feedStr,peakStr,STATE.tz));
    resultArea.appendChild(makeInfoBox('Use your starter <strong style="color:#F5F0E8">at peak</strong> \u2014 that\'s when it has maximum strength.'));
    resultArea.appendChild(makeTimer(peak,STATE.starterName||'your starter'));

    var fbDone=false;
    var fbCard=makeCard([makeCardHead('Was this accurate?'),div('hint','After your starter peaks, tap to calibrate future estimates.')]);
    var fbRow=div('fb-row');
    append(fbRow,
      makeFbBtn('\u26A1','Early','fb-btn fb-green',function(){if(!fbDone){fbDone=true;STATE.bias=applyFeedback(STATE.bias,'early');save();fbCard.innerHTML='';fbCard.appendChild(div('box-green','\u2713 Feedback saved \u2014 model updated'));}}),
      makeFbBtn('\u2713','Spot on','fb-btn fb-gold',function(){if(!fbDone){fbDone=true;STATE.bias=applyFeedback(STATE.bias,'spot-on');save();fbCard.innerHTML='';fbCard.appendChild(div('box-green','\u2713 Feedback saved \u2014 model updated'));}}),
      makeFbBtn('🐢','Late','fb-btn fb-red',function(){if(!fbDone){fbDone=true;STATE.bias=applyFeedback(STATE.bias,'late');save();fbCard.innerHTML='';fbCard.appendChild(div('box-green','\u2713 Feedback saved \u2014 model updated'));}})
    );
    fbCard.appendChild(fbRow);resultArea.appendChild(fbCard);
  });
  append(wrap,goBtn,resultArea);
  return wrap;
}

// ---- Hydration tab ----
function makeHydrationTab(){
  var wrap=div('fade-in');
  var flour=500,water=350,starterG=75,starterHyd=100,salt=10;
  wrap.appendChild(makeInfoBox('True hydration includes water locked inside your starter \u2014 not just what you add to the dough.'));
  wrap.appendChild(makeSpacer());

  var resultCard=makeCard([]);
  function updateResult(){
    var sF=Math.round(starterG/(1+starterHyd/100)),sW=starterG-sF;
    var tF=flour+sF,tW=water+sW,hyd=Math.round(tW/tF*100),saltPct=(salt/flour*100).toFixed(1);
    resultCard.innerHTML='';
    function hr(label,val,big,gold){var d=div('hyd-row'+(big?' big':''));append(d,div('hyd-label',label));var v=div('hyd-val',val);if(gold)v.style.color='#E8B84B';d.appendChild(v);return d;}
    append(resultCard,hr('Total flour',tF+'g',false,false),hr('Total water',tW+'g',false,false),div('divider'),hr('True hydration',hyd+'%',true,true),hr("Salt (baker's %)",saltPct+'%',false,false),hr('Total dough',(tF+tW+salt)+'g',false,false),makeSpacer(true),makeInfoBox(hyd<65?'Low hydration \u2014 tight crumb, easy to handle.':hyd<72?'Standard \u2014 reliable all-rounder.':hyd<78?'Higher hydration \u2014 open crumb, needs technique.':'Very high \u2014 challenging to shape, very open crumb.'));
  }

  var fields=[{label:'Flour (g)',get:function(){return flour;},set:function(v){flour=v;},min:100,max:2000},{label:'Water (g)',get:function(){return water;},set:function(v){water=v;},min:50,max:2000},{label:'Starter / levain (g)',get:function(){return starterG;},set:function(v){starterG=v;},min:0,max:500},{label:'Starter hydration (%)',get:function(){return starterHyd;},set:function(v){starterHyd=v;},min:50,max:150},{label:'Salt (g)',get:function(){return salt;},set:function(v){salt=v;},min:0,max:40}];
  fields.forEach(function(f){
    var isP=f.label.indexOf('%')>-1;
    wrap.appendChild(makeSlider({label:f.label,display:f.get()+(isP?'%':'g'),displayFn:function(v){return v+(isP?'%':'g');},min:f.min,max:f.max,step:5,value:f.get(),lo:''+f.min,hi:''+f.max,onChange:function(v){f.set(v);updateResult();}}));
  });
  wrap.appendChild(makeSpacer());
  updateResult();
  wrap.appendChild(resultCard);
  return wrap;
}

// ---- Bake tab ----
function makeBakeTab(){
  var wrap=div('fade-in');
  var doughType='lean',vessel='dutch',loafSize=900,inclusions=['none'],convection=false;

  wrap.appendChild(makeInfoBox('Bake times and temperatures based on your setup. Use <strong style="color:#F5F0E8">crust colour and internal temperature</strong> as your real finish line.'));

  // Dough type
  wrap.appendChild(makeSectionHead('Dough type'));
  var dtToggle=makeToggle([{id:'lean',label:'Lean (flour, water, salt, starter)'},{id:'enriched',label:'Enriched (butter, eggs, milk\u2026)'}],'lean',function(v){doughType=v;if(v==='enriched'){vessel='tin';updateVesselButtons();}dtHint.style.display=v==='enriched'?'':'none';});
  wrap.appendChild(dtToggle);
  var dtHint=div('hint','Enriched doughs bake at lower temps (165\u2013185\u00B0C), don\'t need steam, and target 88\u00B0C internal. Tin is selected automatically.');dtHint.style.display='none';dtHint.style.marginTop='8px';
  wrap.appendChild(dtHint);
  wrap.appendChild(makeSpacer());

  // Loaf size
  wrap.appendChild(makeSectionHead('Loaf size'));
  var sizeGrid=div('size-grid');
  [{label:'Small',sub:'~600g',g:600},{label:'Standard',sub:'~900g',g:900},{label:'Large',sub:'~1100g',g:1100},{label:'Jumbo',sub:'~1300g',g:1300}].forEach(function(s){
    var btn=div('size-btn'+(loafSize===s.g?' active':''));
    append(btn,div('size-btn-label',s.label),div('size-btn-sub',s.sub));
    btn.addEventListener('click',function(){loafSize=s.g;sizeInp.value=s.g;sizeGrid.querySelectorAll('.size-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');});
    sizeGrid.appendChild(btn);
  });
  wrap.appendChild(sizeGrid);
  var sizeInp=el('input',{type:'number',class:'sel-input',value:loafSize,min:300,max:2000,placeholder:'e.g. 950',style:'font-size:18px;font-weight:600'});
  sizeInp.addEventListener('input',function(){loafSize=Math.max(300,+sizeInp.value);sizeGrid.querySelectorAll('.size-btn').forEach(function(b){b.classList.remove('active');});});
  wrap.appendChild(sizeInp);
  wrap.appendChild(makeSpacer());

  // Vessel
  wrap.appendChild(makeSectionHead('Bake vessel'));
  var vesselGrid=div('vessel-grid');
  function updateVesselButtons(){
    vesselGrid.innerHTML='';
    var available=doughType==='enriched'?BAKE_VESSELS.filter(function(v){return v.id==='tin';}):BAKE_VESSELS;
    available.forEach(function(v){
      var btn=div('vessel-btn'+(vessel===v.id?' active':''));
      append(btn,div('vessel-icon',v.icon),div('vessel-label',v.label));
      btn.addEventListener('click',function(){vessel=v.id;updateVesselButtons();vesselNote.textContent=v.note;});
      vesselGrid.appendChild(btn);
    });
    var currentV=BAKE_VESSELS.filter(function(v){return v.id===vessel;})[0];
    if(vesselNote&&currentV)vesselNote.textContent=currentV.note;
  }
  var vesselNote=div('hint','Best steam. Cast iron holds heat evenly.');vesselNote.style.cssText='font-size:13px;color:#6B6352;margin-bottom:16px;line-height:1.5';
  wrap.appendChild(vesselGrid);wrap.appendChild(vesselNote);
  updateVesselButtons();
  wrap.appendChild(makeSpacer());

  // Inclusions
  var activeIncEl=document.createElement('span');activeIncEl.style.cssText='color:#E8B84B;font-weight:700;margin-left:6px;font-size:11px';
  var incHead=div('sec-head');incHead.appendChild(txt('Inclusions'));incHead.appendChild(activeIncEl);
  wrap.appendChild(incHead);

  var noneBtn=div('inc-btn active');
  var noneCheck=div('inc-check','\u2713');append(noneBtn,noneCheck,txt('None \u2014 plain dough'));
  noneBtn.addEventListener('click',function(){inclusions=['none'];updateIncButtons();});
  wrap.appendChild(noneBtn);

  var incGroups=div('');
  INCLUSION_GROUPS.filter(function(g){return g.group!=='None';}).forEach(function(group){
    var gl=div('inc-group-label',group.group);incGroups.appendChild(gl);
    group.items.forEach(function(inc){
      var btn=makeIncButton(inc.label,inclusions.indexOf(inc.id)>-1,function(){
        var idx=inclusions.indexOf(inc.id);
        var noneIdx=inclusions.indexOf('none');
        if(idx>-1){inclusions.splice(idx,1);if(inclusions.length===0)inclusions=['none'];}
        else{if(noneIdx>-1)inclusions.splice(noneIdx,1);inclusions.push(inc.id);}
        updateIncButtons();
      });
      btn.dataset.incId=inc.id;
      incGroups.appendChild(btn);
    });
  });
  wrap.appendChild(incGroups);

  function updateIncButtons(){
    var active=inclusions.filter(function(i){return i!=='none';});
    activeIncEl.textContent=active.length>0?active.length+' selected':'';
    noneBtn.classList.toggle('active',inclusions.indexOf('none')>-1);
    noneCheck.textContent=inclusions.indexOf('none')>-1?'\u2713':'';
    incGroups.querySelectorAll('.inc-btn').forEach(function(btn){
      var id=btn.dataset.incId;var isActive=inclusions.indexOf(id)>-1;
      btn.classList.toggle('active',isActive);
      btn.querySelector('.inc-check').textContent=isActive?'\u2713':'';
    });
  }
  wrap.appendChild(makeSpacer());

  // Oven
  wrap.appendChild(makeSectionHead('Oven setting'));
  var ovenToggle=makeToggle([{id:'off',label:'Fan off (conventional)'},{id:'on',label:'Fan on (convection)'}],'off',function(v){convection=v==='on';});
  wrap.appendChild(ovenToggle);
  wrap.appendChild(makeSpacer());

  var goBtn=el('button',{'class':'go-btn'},'Generate bake plan');
  var resultArea=div('');
  goBtn.addEventListener('click',function(){
    resultArea.innerHTML='';resultArea.className='fade-in';
    var plan=getBakePlan(vessel,doughType,loafSize,inclusions,convection);
    resultArea.appendChild(makeSectionHead('Your bake plan'));
    plan.phases.forEach(function(phase,i){
      var step=div('bake-step'+(i===1?' main-step':''));
      var header=div('bake-step-header');
      var lbl=div('bake-step-label','Step '+(i+1)+' \u2014 '+phase.label);
      header.appendChild(lbl);
      if(phase.mins){var minsEl=div('bake-step-mins',phase.mins+' min');header.appendChild(minsEl);}
      step.appendChild(header);
      step.appendChild(div('bake-step-temp',phase.temp+'\u00B0C'));
      step.appendChild(div('bake-step-detail',phase.detail));
      resultArea.appendChild(step);
    });
    var tiles=div('tiles');append(tiles,makeTile('Total bake time',plan.totalMins+' min','approximate',true),makeTile('Internal temp',plan.internalTarget+'\u00B0C','minimum target',false));
    resultArea.appendChild(tiles);
    var notesCard=makeCard([makeCardHead('Setup notes')]);
    var notesBody=div('');notesBody.style.cssText='font-size:13px;color:#9B9180;line-height:1.7';
    notesBody.innerHTML='<strong style="color:#F5F0E8">Steam:</strong> '+plan.steamNote+'<br><strong style="color:#F5F0E8">Fan:</strong> '+plan.fanNote+(plan.tinTip?'<div style="margin-top:4px;background:#252218;border-radius:8px;padding:8px 10px;font-size:12px;color:#6B6352">💡 '+plan.tinTip+'</div>':'');
    notesCard.appendChild(notesBody);resultArea.appendChild(notesCard);
    if(plan.incNotes.length>0){
      var incCard=makeCard([makeCardHead('Inclusion notes')]);
      var incBody=div('');incBody.style.cssText='display:flex;flex-direction:column;gap:8px';
      plan.incNotes.forEach(function(note){var n=div('');n.style.cssText='font-size:13px;color:#9B9180;line-height:1.6;padding-left:12px;border-left:2px solid #E8B84B66';n.textContent=note;incBody.appendChild(n);});
      incCard.appendChild(incBody);resultArea.appendChild(incCard);
    }
    var doneCard=makeCard([makeCardHead('How to know it\'s done')]);
    doneCard.innerHTML+='<div style="font-size:13px;color:#9B9180;line-height:1.8">🎨 <strong style="color:#F5F0E8">Crust colour</strong> \u2014 deep golden brown, not pale.<br>🌡️ <strong style="color:#F5F0E8">Internal temp</strong> \u2014 probe the centre: '+plan.internalTarget+'\u00B0C minimum<br>🔊 <strong style="color:#F5F0E8">Hollow knock</strong> \u2014 tap the bottom, it should sound hollow<br>\u23F3 <strong style="color:#F5F0E8">Cool completely</strong> \u2014 at least 1 hour before slicing.</div>';
    resultArea.appendChild(doneCard);
    resultArea.appendChild(makeInfoBox("These are well-researched starting points, not guarantees. Your oven may run hot or cold \u2014 adjust from there."));
  });
  append(wrap,goBtn,resultArea);
  return wrap;
}

// ---- Bake Log tab ----
function makeBakeLogTab(){
  var wrap=div('fade-in');
  var obs=generateObservations(STATE.bakeLog);
  if(STATE.bakeLog.length>=3&&obs.length>0){
    wrap.appendChild(makeSectionHead('Observations'));
    obs.forEach(function(o){var d=div('obs-box');append(d,div('','💡 '),div('obs-text',o));wrap.appendChild(d);});
    wrap.appendChild(makeSpacer());
  }

  // Standalone log button
  var logBtnArea=div('');
  var standaloneBtn=el('button',{'class':'log-btn'},'📓 Log a bake');
  var standaloneForm=div('');
  standaloneBtn.addEventListener('click',function(){
    standaloneBtn.style.display='none';
    standaloneForm.appendChild(makeBakeLogForm(
      {ratio:null,flourLabel:null,tempC:null,peak:null},
      function(entry){
        STATE.bakeLog.unshift(entry);
        if(STATE.bakeLog.length>100)STATE.bakeLog.pop();
        save();
        // Rebuild tab
        var body=document.getElementById('app-body');
        body.innerHTML='';
        body.appendChild(makeBakeLogTab());
      },
      function(){standaloneBtn.style.display='';standaloneForm.innerHTML='';}
    ));
  });
  append(logBtnArea,standaloneBtn,standaloneForm);
  wrap.appendChild(logBtnArea);
  wrap.appendChild(makeSpacer());

  var logHead=div('sec-head');logHead.appendChild(txt('Bake log '));
  if(STATE.bakeLog.length>0){var cnt=el('span',{style:'color:#6B6352;font-weight:400;text-transform:none;letter-spacing:0;font-size:11px'},STATE.bakeLog.length+' bake'+(STATE.bakeLog.length!==1?'s':''));logHead.appendChild(cnt);}
  wrap.appendChild(logHead);
  if(STATE.bakeLog.length===0){
    var empty=div('empty-state');append(empty,div('empty-icon','📓'),txt('No bakes logged yet.'),el('br'),txt('Tap '),el('strong',{style:'color:#9B9180'},'Log a bake'),txt(' above to start your record.'));
    wrap.appendChild(empty);
  }else{
    STATE.bakeLog.forEach(function(b){
      var card=makeCard([]);
      var headerRow=div('');headerRow.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px';
      var leftCol=div('');
      var overall=b.ratings&&b.ratings.overall?b.ratings.overall:'Bake';
      var emoji='';if(overall.indexOf('Best')>-1)emoji='🔥 ';else if(overall.indexOf('Happy')>-1)emoji='\u2713 ';else if(overall==='Meh')emoji='😐 ';else if(overall.indexOf('Bin')>-1)emoji='💀 ';
      var title=div('');title.style.cssText='color:#F5F0E8;font-size:15px;font-weight:700;margin-bottom:2px';title.textContent=emoji+overall.replace(/^[^\w🔥\u2713😐💀]*/,'');
      var dateEl=div('');dateEl.style.cssText='color:#6B6352;font-size:12px';dateEl.textContent=b.date;
      append(leftCol,title,dateEl);headerRow.appendChild(leftCol);
      if(b.internalTemp){var tempCol=div('');tempCol.style.textAlign='right';var tv=div('');tv.style.cssText='font-size:18px;color:'+(b.internalTemp>=98?'#6FCF8A':'#E8B84B')+';font-weight:700';tv.textContent=b.internalTemp+'\u00B0C';var ts=div('');ts.style.cssText='font-size:10px;color:#6B6352';ts.textContent='internal';append(tempCol,tv,ts);headerRow.appendChild(tempCol);}
      card.appendChild(headerRow);
      var pills=div('');pills.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px';
      if(b.ratio)pills.appendChild(makeHistPill('Ratio',fmtRatio(b.ratio)));
      if(b.tempC)pills.appendChild(makeHistPill('Temp',b.tempC+'\u00B0C'));
      if(b.bulkHours)pills.appendChild(makeHistPill('Bulk',fmtH(b.bulkHours)));
      if(b.proofType)pills.appendChild(makeHistPill('Proof',(b.proofType==='cold'?'\u2744 ':'')+fmtH(b.proofHours)));
      card.appendChild(pills);
      if(b.ratings){var rPills=div('rating-pills');Object.keys(b.ratings).filter(function(k){return b.ratings[k];}).forEach(function(k){var p=div('rating-pill',b.ratings[k]);rPills.appendChild(p);});card.appendChild(rPills);}
      if(b.notes){var n=div('');n.style.cssText='font-size:13px;color:#9B9180;line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid #3A3528;font-style:italic';n.textContent=b.notes;card.appendChild(n);}
      wrap.appendChild(card);
    });
    var clearBtn=el('button',{'class':'go-btn'},'Clear bake log');clearBtn.style.cssText='background:#252218;color:#6B6352;border:none;border-radius:12px;width:100%;padding:16px 0;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px';
    clearBtn.addEventListener('click',function(){if(confirm('Clear all logged bakes?')){STATE.bakeLog=[];save();wrap.innerHTML='';wrap.appendChild(makeBakeLogTab());}});
    wrap.appendChild(clearBtn);
  }
  return wrap;
}

function makeHistPill(label,val){
  var d=div('hist-pill');append(d,div('hist-pill-label',label),div('hist-pill-val',val));return d;
}

// ---- Header init ----
function initHeader(){
  var clockEl=document.getElementById('clock-display');
  var tzShortEl=document.getElementById('tz-short');
  var tzBtn=document.getElementById('tz-btn');
  var tzPanel=document.getElementById('tz-panel');
  var tzList=document.getElementById('tz-list');
  var settingsBtn=document.getElementById('settings-btn');
  var settingsPanel=document.getElementById('settings-panel');
  var nameInput=document.getElementById('starter-name-input');
  var notifSection=document.getElementById('notif-section');
  var biasBadgeWrap=document.getElementById('bias-badge-wrap');

  nameInput.value=STATE.starterName;
  nameInput.addEventListener('input',function(){STATE.starterName=nameInput.value;save();});

  function updateClock(){clockEl.textContent=fmtDisplay(nowInTz(STATE.tz),STATE.tz);}
  updateClock();setInterval(updateClock,30000);

  var tzShortText=(TIMEZONES.filter(function(t){return t.tz===STATE.tz;})[0]||{label:STATE.tz}).label.split(' ')[0];
  tzShortEl.textContent=tzShortText;

  TIMEZONES.forEach(function(t){
    var btn=el('button',{style:'display:block;width:100%;background:transparent;border:none;border-radius:8px;padding:9px 12px;color:'+(STATE.tz===t.tz?'#F5F0E8':'#9B9180')+';font-size:13px;cursor:pointer;font-family:inherit;text-align:left;font-weight:'+(STATE.tz===t.tz?600:400)},STATE.tz===t.tz?'\u2713 '+t.label:t.label);
    btn.addEventListener('click',function(){STATE.tz=t.tz;save();tzPanel.classList.remove('open');tzShortEl.textContent=t.label.split(' ')[0];updateClock();});
    tzList.appendChild(btn);
  });

  tzBtn.addEventListener('click',function(){tzPanel.classList.toggle('open');settingsPanel.classList.remove('open');});
  settingsBtn.addEventListener('click',function(){settingsPanel.classList.toggle('open');tzPanel.classList.remove('open');updateBiasBadge();});

  function updateNotifSection(){
    notifSection.innerHTML='';
    if(typeof Notification==='undefined'){notifSection.appendChild(div('hint','Not supported in this browser.'));return;}
    if(Notification.permission==='granted'){var d=div('');d.style.cssText='font-size:13px;color:#6FCF8A';d.textContent='\u2713 Notifications enabled';notifSection.appendChild(d);return;}
    if(Notification.permission==='denied'){var d2=div('hint');d2.style.color='#E07060';d2.textContent='Notifications blocked. Go to Settings \u2192 Safari \u2192 Notifications.';notifSection.appendChild(d2);return;}
    var btn=el('button',{'class':'go-btn'},'Enable notifications');btn.style.cssText='background:#E8B84B;border:none;border-radius:12px;padding:11px 0;width:100%;font-size:15px;font-weight:700;color:#0F0E0C;cursor:pointer;margin-top:0';
    btn.addEventListener('click',function(){Notification.requestPermission().then(function(r){updateNotifSection();});});
    notifSection.appendChild(btn);
  }
  updateNotifSection();

  function updateBiasBadge(){
    biasBadgeWrap.innerHTML='';
    if(STATE.bias!==1){
      var d=div('');d.style.cssText='display:inline-flex;align-items:center;gap:8px;margin-top:8px;background:#252218;border:1px solid #6B6040;border-radius:20px;padding:5px 12px;font-size:12px;color:#9B9180';
      d.appendChild(txt('Model calibrated \u2014 '+(STATE.bias<1?'running faster':'running slower')+' than baseline'));
      var reset=el('button',{style:'background:transparent;border:1px solid #3A3528;border-radius:10px;padding:2px 8px;font-size:11px;color:#6B6352;cursor:pointer'},'Reset');
      reset.addEventListener('click',function(){STATE.bias=1;save();updateBiasBadge();});
      d.appendChild(reset);biasBadgeWrap.appendChild(d);
    }
  }
}

// ---- Tab rendering ----
function initTabs(){
  var tabBar=document.getElementById('tab-bar');
  var body=document.getElementById('app-body');
  TABS.forEach(function(label,i){
    var btn=div('tab-btn'+(i===0?' active':''));
    append(btn,div('tab-icon',TAB_ICONS[i]),div('tab-label',label));
    btn.addEventListener('click',function(){
      if(timerInterval&&i!==STATE.tab){clearInterval(timerInterval);timerInterval=null;}
      tabBar.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');STATE.tab=i;renderTab(i);
    });
    tabBar.appendChild(btn);
  });
  renderTab(0);
}

function renderTab(i){
  var body=document.getElementById('app-body');
  body.innerHTML='';
  if(i===0)body.appendChild(makePlannerTab());
  else if(i===1)body.appendChild(makeSchedulerTab());
  else if(i===2)body.appendChild(makeHydrationTab());
  else if(i===3)body.appendChild(makeBakeTab());
  else if(i===4)body.appendChild(makeBakeLogTab());
}

// ---- Boot ----
document.addEventListener('DOMContentLoaded',function(){
  initHeader();
  initTabs();
});

})();
</script>
